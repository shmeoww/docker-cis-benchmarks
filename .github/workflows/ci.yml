# GitHub Actions CI — запускается при push и pull_request в main/develop.
# Проверяет: тесты, SAST (gosec, bandit), SCA (govulncheck, pip-audit).

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ── Go: тесты + SAST + SCA ────────────────────────────────────────────────
  go-checks:
    name: Go tests & security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: scanner/go.sum

      - name: go mod download
        working-directory: scanner
        run: go mod download

      - name: go test (internal packages)
        working-directory: scanner
        # ./internal/... вместо ./... — main_test.go требует mysql:8.0 в Docker,
        # которого нет в CI. internal/ покрывает всю бизнес-логику.
        run: go test -short -v ./internal/...

      - name: gosec — SAST (статический анализ кода Go)
        working-directory: scanner
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...
        continue-on-error: true   # предупреждения не блокируют CI

      - name: govulncheck — SCA (уязвимости в зависимостях Go)
        working-directory: scanner
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        continue-on-error: true

  # ── Python: тесты + SAST + SCA ───────────────────────────────────────────
  python-checks:
    name: Python tests & security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: pip install
        run: pip install -r requirements.txt

      - name: pytest (unit-тесты, без Go-сервиса)
        working-directory: orchestrator
        run: pytest -k "not Integration" -v
        # Покрытие через addopts в pytest.ini — включено автоматически

      - name: bandit — SAST (статический анализ кода Python)
        run: |
          pip install bandit
          bandit -r orchestrator/ -x orchestrator/tests/ -f txt
        continue-on-error: true

      - name: pip-audit — SCA (уязвимости в Python-зависимостях)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
        continue-on-error: true